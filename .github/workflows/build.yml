name: Build HWP Merger EXE

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정 (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5
          pip install pyinstaller
          # HWP COM 자동화가 필요한 경우 (한글 설치 환경에서만 동작)
          # pip install pywin32

      - name: PyInstaller로 EXE 빌드
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "HWP_Merger" `
            --icon "icon.ico" `
            hwp_merger.py
        # icon.ico가 없으면 아래처럼 --icon 옵션 제거
        # pyinstaller --onefile --windowed --name "HWP_Merger" hwp_merger.py

      - name: 빌드 결과 확인
        run: |
          dir dist\

      - name: EXE 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: HWP_Merger_Windows
          path: dist/HWP_Merger.exe
          retention-days: 30

  # 태그 푸시 시 GitHub Release 자동 생성
  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: HWP_Merger_Windows

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          files: HWP_Merger.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
